<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yggdrasil.gg - Enter the Hall</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Ambient floating particles -->
    <div class="ambient-particles" id="ambientParticles"></div>

    <div class="main-wrapper">
        <header>
            <h1 class="logo-text">yggdrasil.gg</h1>
            <p class="subtitle">Esims Schedule Calendar</p>
        </header>

        <div class="ornament-line"></div>

        <main>
            <div class="login-box">
                <form action="/login" method="POST">
                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                        <input type="email" name="email" placeholder="Email address" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" name="password" id="pwInput" class="pw-field" placeholder="Password" required autocomplete="current-password">
                        <button type="button" class="pw-toggle" onclick="const i=document.getElementById('pwInput');const t=i.type==='password'?'text':'password';i.type=t;this.textContent=t==='password'?'Show':'Hide';">Show</button>
                    </div>

                    <div class="remember-me-group">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <button type="submit" class="login-btn">Enter the Calendar</button>
                </form>
                <div class="footer-links">
                    <a href="#" onclick="alert('Contact Admin of Yggdrasil or your line manager.'); return false;">Forgot password?</a>
                </div>
            </div>
        </main>

        <footer class="bottom-branding">
            <p>Oddin.gg</p>
        </footer>
    </div>
<!-- Error modal -->
<div id="errorModal" style="display:none;position:fixed;z-index:999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);align-items:center;justify-content:center;">
    <div style="background:rgba(20,20,20,0.95);border-radius:16px;padding:36px 40px;width:360px;text-align:center;border:1px solid rgba(255,68,68,0.3);box-shadow:0 0 60px rgba(255,68,68,0.15),0 24px 48px rgba(0,0,0,0.5);backdrop-filter:blur(20px);">
        <div style="width:48px;height:48px;margin:0 auto 16px;border-radius:50%;background:rgba(255,68,68,0.1);display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <div style="font-family:'Oswald',sans-serif;font-size:1.15rem;color:#ff6b6b;letter-spacing:1.5px;margin-bottom:8px;">ACCESS DENIED</div>
        <div style="font-size:0.85rem;color:rgba(255,255,255,0.5);margin-bottom:28px;line-height:1.6;">Wrong password or email,<br>please try again.</div>
        <button onclick="document.getElementById('errorModal').style.display='none';history.replaceState(null,'','/');document.querySelector('input[type=email]').focus();"
            style="background:rgba(255,68,68,0.15);color:#ff6b6b;border:1px solid rgba(255,68,68,0.3);padding:12px 32px;border-radius:10px;font-family:'Oswald',sans-serif;font-size:0.95rem;cursor:pointer;letter-spacing:1.5px;transition:all 0.2s;width:100%;"
            onmouseover="this.style.background='rgba(255,68,68,0.25)';this.style.borderColor='rgba(255,68,68,0.5)'"
            onmouseout="this.style.background='rgba(255,68,68,0.15)';this.style.borderColor='rgba(255,68,68,0.3)'">
            TRY AGAIN
        </button>
    </div>
</div>
<script>
    // Background breathing (slow scale pulse)
    (function() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        let phase = 0;
        function breathe() {
            phase += 0.008;
            const scale = 1 + Math.sin(phase) * 0.025;
            document.documentElement.style.setProperty('--bg-scale', scale);
            requestAnimationFrame(breathe);
        }
        const style = document.createElement('style');
        style.textContent = 'body::before { transform: scale(var(--bg-scale,1)); }';
        document.head.appendChild(style);
        breathe();
    })();

    // Season detection + themed particles
    (function() {
        const now = new Date();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const md = m * 100 + d;

        // Allow override via ?season=winter|spring|summer|autumn
        const urlSeason = new URLSearchParams(window.location.search).get('season');
        let season;
        if (['winter','spring','summer','autumn'].includes(urlSeason)) {
            season = urlSeason;
        } else if (md >= 1221 || md <= 320) season = 'winter';
        else if (md >= 321 && md <= 620) season = 'spring';
        else if (md >= 621 && md <= 922) season = 'summer';
        else season = 'autumn';

        document.body.classList.add('season-' + season);

        // Season particles container
        const sp = document.createElement('div');
        sp.className = 'season-particles';
        document.body.appendChild(sp);

        if (season === 'winter') {
            // Snow cap on card
            const card = document.querySelector('.main-wrapper');
            const cap = document.createElement('div');
            cap.className = 'snow-cap';
            card.appendChild(cap);

            // Snowflakes
            for (let i = 0; i < 150; i++) {
                const s = document.createElement('div');
                s.className = 'snowflake';
                s.style.left = Math.random() * 100 + '%';
                s.style.setProperty('--size', (2 + Math.random() * 5) + 'px');
                s.style.setProperty('--dur', (5 + Math.random() * 8) + 's');
                s.style.setProperty('--delay', (Math.random() * 8) + 's');
                s.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
                s.style.setProperty('--opa', (0.3 + Math.random() * 0.5).toFixed(2));
                sp.appendChild(s);
            }
        }

        if (season === 'spring') {
            const pinks = ['rgba(255,182,193,0.8)', 'rgba(255,160,180,0.7)', 'rgba(255,200,210,0.75)', 'rgba(248,187,208,0.8)'];
            for (let i = 0; i < 70; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.left = Math.random() * 100 + '%';
                p.style.setProperty('--size', (8 + Math.random() * 8) + 'px');
                p.style.setProperty('--dur', (6 + Math.random() * 8) + 's');
                p.style.setProperty('--delay', (Math.random() * 10) + 's');
                p.style.setProperty('--drift', (Math.random() * 100 - 50) + 'px');
                p.style.setProperty('--rot', Math.floor(Math.random() * 360) + 'deg');
                p.style.setProperty('--pcolor', pinks[Math.floor(Math.random() * pinks.length)]);
                sp.appendChild(p);
            }
        }

        if (season === 'summer') {
            // Sun glow
            const sun = document.createElement('div');
            sun.className = 'summer-sun';
            document.body.appendChild(sun);

            // Fireflies
            for (let i = 0; i < 80; i++) {
                const f = document.createElement('div');
                f.className = 'firefly';
                f.style.left = Math.random() * 100 + '%';
                f.style.top = (20 + Math.random() * 70) + '%';
                f.style.setProperty('--size', (3 + Math.random() * 4) + 'px');
                f.style.setProperty('--dur', (8 + Math.random() * 12) + 's');
                f.style.setProperty('--delay', (Math.random() * 8) + 's');
                f.style.setProperty('--dx1', (Math.random() * 60 - 30) + 'px');
                f.style.setProperty('--dy1', (Math.random() * 60 - 30) + 'px');
                f.style.setProperty('--dx2', (Math.random() * 80 - 40) + 'px');
                f.style.setProperty('--dy2', (Math.random() * 80 - 40) + 'px');
                f.style.setProperty('--dx3', (Math.random() * 60 - 30) + 'px');
                f.style.setProperty('--dy3', (Math.random() * 60 - 30) + 'px');
                sp.appendChild(f);
            }
        }

        if (season === 'autumn') {
            const leafColors = ['rgba(210,120,30,0.85)', 'rgba(180,80,20,0.8)', 'rgba(200,160,40,0.75)', 'rgba(160,60,20,0.8)', 'rgba(220,170,50,0.7)'];
            for (let i = 0; i < 65; i++) {
                const l = document.createElement('div');
                l.className = 'leaf';
                l.style.left = Math.random() * 100 + '%';
                l.style.setProperty('--size', (10 + Math.random() * 10) + 'px');
                l.style.setProperty('--dur', (6 + Math.random() * 8) + 's');
                l.style.setProperty('--delay', (Math.random() * 10) + 's');
                l.style.setProperty('--drift', (Math.random() * 120 - 60) + 'px');
                l.style.setProperty('--rot', Math.floor(Math.random() * 360) + 'deg');
                l.style.setProperty('--lcolor', leafColors[Math.floor(Math.random() * leafColors.length)]);
                sp.appendChild(l);
            }
        }

        // Ambient gold particles (all seasons, reduced in winter)
        const container = document.getElementById('ambientParticles');
        const count = season === 'winter' ? 8 : 20;
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'ambient-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.bottom = '-10px';
            p.style.setProperty('--size', (2 + Math.random() * 3) + 'px');
            p.style.setProperty('--dur', (6 + Math.random() * 10) + 's');
            p.style.setProperty('--delay', (Math.random() * 8) + 's');
            p.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
            container.appendChild(p);
        }
    })();

    if (new URLSearchParams(window.location.search).get('error') === '1') {
        document.getElementById('errorModal').style.display = 'flex';
    }

    document.querySelector('form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = this.querySelector('.login-btn');
        btn.disabled = true;
        btn.textContent = 'Connecting...';

        try {
            const resp = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Accept': 'application/json'
                },
                body: new URLSearchParams(new FormData(this))
            });
            const data = await resp.json();

            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                btn.disabled = false;
                btn.textContent = 'Enter the Calendar';
                document.getElementById('errorModal').style.display = 'flex';
                document.getElementById('pwInput').value = '';
            }
        } catch(err) {
            btn.disabled = false;
            btn.textContent = 'Enter the Calendar';
            document.getElementById('errorModal').style.display = 'flex';
        }
    });
</script>
</body>
</html>
